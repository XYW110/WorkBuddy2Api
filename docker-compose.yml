services:
  backend:
    image: ghcr.io/xyw110/workbuddy2api:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/index.js
    ports:
      - "${PORT:-11434}:11434"
    volumes:
      - ${DATA_DIR:-/opt/workbuddy2api}:/app/data
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      PORT: "11434"
      HOST: "0.0.0.0"
      DATA_DIR: /app/data
      STATIC_DIR: /app/public
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:11434/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - 1panel-network

networks:
  1panel-network:
    external: true
