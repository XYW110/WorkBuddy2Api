# ==========================================
# 服务器端部署 Compose（从 GHCR 拉取镜像）
# 使用方式：
#   1. 复制 .env.example 为 .env 并修改 ADMIN_TOKEN
#   2. docker compose -f docker-compose.prod.yml up -d
# ==========================================

services:
  workbuddy2api:
    image: ghcr.io/xyw110/workbuddy2api:latest
    pull_policy: always
    container_name: workbuddy2api
    restart: unless-stopped
    ports:
      - "${PORT:-11434}:11434"
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN:?ADMIN_TOKEN is required}
      PORT: "11434"
      HOST: "0.0.0.0"
      DATA_DIR: /app/data
      STATIC_DIR: /app/public
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      NODE_ENV: production
    volumes:
      - workbuddy-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:11434/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  workbuddy-data:
